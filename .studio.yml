# .studio.yml — crew agent model/effort policy.
# Resolution (most→least specific): run-override > rituals.<ritual>.<step>
#   > roles.<role> > defaults > (omit ⇒ inherit the producer session).
# model: sonnet|opus|haiku|fable  (blank = inherit)   effort: low|medium|high|xhigh|max

defaults:
  model:            # blank = inherit the session model (recommended default)
  effort: medium

roles:
  planner-a:
    effort: medium
  planner-b:
    effort: medium
  dev:
    effort: high
  qa:
    effort: high
  critic:
    effort: high        # the anti-theatre judge — keep it sharp
  summarizer:
    effort: low         # neutral compression; cheap is fine

rituals:
  brainstorm:
    diverge:
      effort: low       # blind opening proposals — cheap
    debate:
      effort: medium
  pairing:
    dev:
      effort: high
    qa:
      effort: high
